<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>图片框选器</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #container {
            position: relative;
            display: inline-block;
            max-width: 100%;
        }
        #image {
            max-width: 100%;
            display: block;
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }
        .controls {
            margin-top: 10px;
        }
        .info {
            font-family: monospace;
            background: #f5f5f5;
            padding: 8px;
            border-radius: 4px;
            margin-top: 5px;
        }
        .hint {
            font-size: 14px;
            color: #666;
            margin: 5px 0;
        }
        button {
            padding: 8px 16px;
            background: #1677FF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background: #0958d9;
        }
        button.secondary {
            background: #f0f0f0;
            color: #333;
        }
        button.secondary:hover {
            background: #d9d9d9;
        }
    </style>
</head>
<body>
    <div id="container">
        <img id="image" />
        <canvas id="canvas"></canvas>
    </div>
    <div class="controls">
        <p class="hint">提示：按住鼠标右键拖拽进行框选</p>
        <div id="coords" class="info"></div>
        <br>
        <button id="clearBtn" class="secondary">清除框选</button>
        <button id="applyBtn">应用框选</button>
    </div>

    <script>
        const image = document.getElementById('image');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const coordsDiv = document.getElementById('coords');
        const clearBtn = document.getElementById('clearBtn');
        const applyBtn = document.getElementById('applyBtn');

        let isDrawing = false;
        let startX = 0, startY = 0;
        let currentBox = null;
        let imgWidth = 0, imgHeight = 0;
        let boxColor = '#1677FF';
        let boxWidth = 3;

        function resizeCanvas() {
            canvas.width = image.offsetWidth;
            canvas.height = image.offsetHeight;
            redrawBox();
        }

        function redrawBox() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (currentBox) {
                const scaleX = canvas.width / imgWidth;
                const scaleY = canvas.height / imgHeight;
                ctx.strokeStyle = boxColor;
                ctx.lineWidth = boxWidth;
                ctx.strokeRect(
                    currentBox.x1 * scaleX,
                    currentBox.y1 * scaleY,
                    (currentBox.x2 - currentBox.x1) * scaleX,
                    (currentBox.y2 - currentBox.y1) * scaleY
                );
            }
        }

        function getImageCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = imgWidth / canvas.width;
            const scaleY = imgHeight / canvas.height;
            return {
                x: Math.max(0, Math.min(imgWidth, Math.round((e.clientX - rect.left) * scaleX))),
                y: Math.max(0, Math.min(imgHeight, Math.round((e.clientY - rect.top) * scaleY)))
            };
        }

        image.onload = function() {
            setTimeout(resizeCanvas, 100);
        };
        window.addEventListener('resize', resizeCanvas);

        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            e.stopPropagation();
        });

        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 2) {
                e.preventDefault();
                isDrawing = true;
                const coords = getImageCoords(e);
                startX = coords.x;
                startY = coords.y;
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDrawing) {
                const coords = getImageCoords(e);
                const scaleX = canvas.width / imgWidth;
                const scaleY = canvas.height / imgHeight;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = boxColor;
                ctx.lineWidth = boxWidth;
                const x1 = Math.min(startX, coords.x);
                const y1 = Math.min(startY, coords.y);
                const x2 = Math.max(startX, coords.x);
                const y2 = Math.max(startY, coords.y);
                ctx.strokeRect(
                    x1 * scaleX,
                    y1 * scaleY,
                    (x2 - x1) * scaleX,
                    (y2 - y1) * scaleY
                );
                coordsDiv.textContent = `框选中: (${x1}, ${y1}) → (${x2}, ${y2})`;
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            if (isDrawing && e.button === 2) {
                isDrawing = false;
                const coords = getImageCoords(e);
                currentBox = {
                    x1: Math.min(startX, coords.x),
                    y1: Math.min(startY, coords.y),
                    x2: Math.max(startX, coords.x),
                    y2: Math.max(startY, coords.y)
                };
                coordsDiv.textContent = `已框选: (${currentBox.x1}, ${currentBox.y1}) → (${currentBox.x2}, ${currentBox.y2})`;
                redrawBox();
            }
        });

        clearBtn.addEventListener('click', () => {
            currentBox = null;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            coordsDiv.textContent = '';
        });

        applyBtn.addEventListener('click', () => {
            if (currentBox) {
                const coordsStr = `${currentBox.x1},${currentBox.y1},${currentBox.x2},${currentBox.y2}`;
                window.parent.postMessage({
                    type: 'boxCoords',
                    coords: coordsStr
                }, '*');
            }
        });

        window.addEventListener('message', (e) => {
            if (e.data.type === 'init') {
                image.src = e.data.imageSrc;
                imgWidth = e.data.imgWidth;
                imgHeight = e.data.imgHeight;
                boxColor = e.data.boxColor;
                boxWidth = e.data.boxWidth;
                if (e.data.currentCoords) {
                    const [x1, y1, x2, y2] = e.data.currentCoords.split(',').map(Number);
                    currentBox = { x1, y1, x2, y2 };
                    coordsDiv.textContent = `已框选: (${x1}, ${y1}) → (${x2}, ${y2})`;
                }
            }
        });
    </script>
</body>
</html>
