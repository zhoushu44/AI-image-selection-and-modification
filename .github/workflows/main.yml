# 工作流名称（随便起，比如「自动构建Docker镜像」）
name: Build and Push Docker Image
# 触发条件：推送到main分支时自动运行
on:
  push:
    branches: [ master ] # 必改1：改成你的主分支名（比如master）
# 执行的任务
jobs:
  build: # 运行环境（固定用Ubuntu系统）
    runs-on: ubuntu-latest
    steps:
    # 步骤1：把GitHub仓库的代码拉到服务器
    - name: Checkout code
      uses: actions/checkout@v4
    # 步骤2：登录Docker Hub（用之前配置的密钥）
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}
    # 步骤3：构建Docker镜像并推送到Docker Hub
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: . # 固定：从当前目录找Dockerfile
        push: true # 固定：推送到Docker Hub
        tags: zhoushu1/ai-image-selection-and-modification:latest
