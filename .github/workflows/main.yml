# ============================================
# GitHub Actions 自动部署工作流
# 功能：推送到主分支时自动构建并推送 Docker 镜像
# ============================================

name: Build and Push Docker Image

# 触发条件：推送到主分支时自动运行
on:
  push:
    branches: [ main, master ]  # ⚠️ 修改这里：改成你的实际主分支名（main 或 master）

# 执行的任务
jobs:
  build:
    runs-on: ubuntu-latest  # 运行环境：固定用 Ubuntu 最新版
    
    steps:
    # 步骤 1：把 GitHub 仓库的代码拉取到服务器
    - name: Checkout code
      uses: actions/checkout@v4
    
    # 步骤 2：登录 Docker Hub
    # ⚠️ 前提：需要在 GitHub 仓库的 Secrets 中配置：
    #   - DOCKER_HUB_USERNAME: 你的 Docker Hub 用户名
    #   - DOCKER_HUB_TOKEN: 你的 Docker Hub Token
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}
    
    # 步骤 3：构建 Docker 镜像并推送到 Docker Hub
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # ⚠️ 修改这里：改成你的 Docker Hub 用户名/镜像名
        tags: zhoushu1/ai-image-selection-and-modification:latest
